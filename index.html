<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="theme-color" content="#0d0d0d" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="资金记录" />
<title>扑克资金记录</title>
<link rel="manifest" href="manifest.json" />
<link rel="icon" href="icon.svg" type="image/svg+xml" />
<link rel="apple-touch-icon" href="icon.svg" />
<link rel="stylesheet" href="style.css" />
</head>
<body>

<header class="topbar">
  <div class="topbar-left">
    <button id="menuBtn" class="icon-btn" aria-label="笔记菜单" title="笔记菜单">
      <svg viewBox="0 0 24 24" width="20" height="20"><path d="M4 6H20 M4 12H20 M4 18H20" stroke="currentColor" stroke-width="2" stroke-linecap="round" fill="none"/></svg>
    </button>
    <div id="menuDropdown" class="menu-dropdown hidden"></div>
  </div>
  <div class="brand">
    <svg class="brand-mark" width="26" height="26" viewBox="0 0 26 26" fill="none" xmlns="http://www.w3.org/2000/svg">
      <rect width="26" height="26" rx="7" fill="#1a1a19"/>
      <path d="M4 17 L9 11 L13 15 L22 6" stroke="#3987e5" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    </svg>
    <span>扑克资金记录</span>
  </div>
  <button id="importBtn" class="icon-btn hidden" aria-label="导入CSV" title="导入CSV">
    <svg viewBox="0 0 24 24" width="20" height="20"><path d="M12 3 V15 M12 15 L7 10 M12 15 L17 10 M4 19 H20" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/></svg>
  </button>
  <input type="file" id="importFile" accept=".csv,text/csv" style="display:none" />
</header>

<main id="view" class="view"></main>

<button id="fab" class="fab" aria-label="记一局" title="记一局">+</button>

<nav class="tabbar">
  <button class="tab-btn" data-tab="overview" aria-label="概览">
    <svg viewBox="0 0 24 24" width="22" height="22"><path d="M4 20 L4 12 M10 20 L10 6 M16 20 L16 14 M22 20 L22 4" stroke="currentColor" stroke-width="2" stroke-linecap="round" fill="none"/></svg>
    <span>概览</span>
  </button>
  <button class="tab-btn" data-tab="sessions" aria-label="记录">
    <svg viewBox="0 0 24 24" width="22" height="22"><rect x="3" y="4" width="18" height="17" rx="2" stroke="currentColor" stroke-width="2" fill="none"/><path d="M7 9 H17 M7 13 H17 M7 17 H13" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
    <span>记录</span>
  </button>
  <button class="tab-btn" data-tab="locations" aria-label="位置">
    <svg viewBox="0 0 24 24" width="22" height="22"><path d="M12 22 C12 22 5 14.5 5 9.5 A7 7 0 0 1 19 9.5 C19 14.5 12 22 12 22 Z" stroke="currentColor" stroke-width="2" fill="none"/><circle cx="12" cy="9.5" r="2.4" stroke="currentColor" stroke-width="2" fill="none"/></svg>
    <span>位置</span>
  </button>
  <button class="tab-btn" data-tab="charts" aria-label="图表">
    <svg viewBox="0 0 24 24" width="22" height="22"><rect x="3" y="10" width="4" height="10" rx="1" stroke="currentColor" stroke-width="2" fill="none"/><rect x="10" y="5" width="4" height="15" rx="1" stroke="currentColor" stroke-width="2" fill="none"/><rect x="17" y="13" width="4" height="7" rx="1" stroke="currentColor" stroke-width="2" fill="none"/></svg>
    <span>图表</span>
  </button>
  <button class="tab-btn" data-tab="trends" aria-label="趋势">
    <svg viewBox="0 0 24 24" width="22" height="22"><path d="M3 17 L9 10 L14 14 L21 5" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/><path d="M15 5 H21 V11" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/></svg>
    <span>趋势</span>
  </button>
</nav>

<div id="overlay" class="overlay hidden">
  <div class="sheet" id="sheet"></div>
</div>

<div id="toast" class="toast hidden"></div>

<script src="app.js"></script>
</body>
</html>
